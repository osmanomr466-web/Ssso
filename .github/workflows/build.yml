name: Auto-Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Structure
        run: |
          # إنشاء الهيكل الأساسي الذي يتطلبه أندرويد
          mkdir -p app/src/main/java/com/iapp/maker
          # تحريك الملف إذا كان في المجلد الرئيسي
          if [ -f MainActivity.java ]; then mv MainActivity.java app/src/main/java/com/iapp/maker/MainActivity.java; fi
          # إنشاء ملفات الإعدادات الضرورية
          echo "plugins { id 'com.android.application' version '8.0.0' apply false }" > build.gradle
          echo "plugins { id 'com.android.application' } android { namespace 'com.iapp.maker'; compileSdk 33; defaultConfig { applicationId 'com.iapp.maker'; minSdk 21; targetSdk 33 } }" > app/build.gradle
          # إنشاء ملف AndroidManifest بسيط
          echo '<manifest package="com.iapp.maker"><application /></manifest>' > app/src/main/AndroidManifest.xml
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
        
      - name: Build
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with: { name: app-debug, path: app/build/outputs/apk/debug/app-debug.apk }
